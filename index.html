<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OrthoAnalyse — AI Orthodontic Photo Analysis</title>
<meta name="description" content="AI-assisted orthodontic facial photograph analysis. Upload 3 extraoral photos, review AI-detected landmarks, and compute 7 clinical soft-tissue analyses."/>
<meta name="author" content="Ibrahim AlBugha &amp; Doctor Mohammad Samih"/>
<meta name="theme-color" content="#0f172a"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⬡</text></svg>"/>
<meta property="og:title" content="OrthoAnalyse — AI Orthodontic Photo Analysis"/>
<meta property="og:description" content="Decision-support tool for orthodontic soft-tissue analysis. Doctor-in-the-loop, fully browser-based, no data leaves your device."/>
<meta property="og:type" content="website"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;-webkit-font-smoothing:antialiased}
:root{
  --blue:#2563eb;--blue-dark:#1d4ed8;--blue-light:#eff6ff;--blue-border:#bfdbfe;
  --green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;
  --amber:#d97706;--amber-light:#fffbeb;--amber-border:#fde68a;
  --red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;
  --purple:#7c3aed;--purple-light:#f5f3ff;--purple-border:#ddd6fe;
  --navy:#0f172a;--navy2:#1e293b;
  --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
  --gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;
  --gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--gray-900:#0f172a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 28px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);padding:0 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;height:58px;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hdr-logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
.hdr-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 8px rgba(59,130,246,.4);flex-shrink:0}
.hdr-title{font-weight:800;font-size:16px;color:#fff;letter-spacing:-.02em}
.hdr-sep{width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 4px}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.02em;font-weight:500}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.55);font-weight:500}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;flex-shrink:0;animation:pulse-dot 2.2s ease-in-out infinite}
.hdr-archive-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:rgba(255,255,255,.10);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.18);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:.01em}
.hdr-archive-btn:hover{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.35)}

/* ── Progress bar ── */
.pbar{background:#fff;border-bottom:1px solid var(--gray-100);padding:0 28px;overflow-x:auto;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.psteps{display:flex;align-items:center;list-style:none;gap:0;white-space:nowrap;height:48px}
.step{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;border-radius:8px;padding:5px 8px;transition:all .18s;letter-spacing:.01em}
.step-n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .18s}
.step.done{color:#15803d;cursor:pointer}.step.done:hover{background:#f0fdf4}.step.done .step-n{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;box-shadow:0 2px 6px rgba(22,163,74,.3)}
.step.active{color:#1d4ed8}.step.active .step-n{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.35)}
.step.pending{color:var(--gray-400)}.step.pending .step-n{background:var(--gray-200);color:var(--gray-500)}
.step-arr{color:var(--gray-300);margin:0 4px;font-size:11px}

/* ── Layout ── */
.main{max-width:1100px;margin:0 auto;padding:28px 24px}
.card{background:#fff;border-radius:14px;border:1px solid var(--gray-200);padding:20px;box-shadow:var(--shadow-sm)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .16s;line-height:1.2;letter-spacing:.01em}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.30)}.btn-primary:hover{background:linear-gradient(135deg,#2563eb,#1d4ed8);box-shadow:0 4px 14px rgba(37,99,235,.40);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:#fff;color:var(--gray-700);border:1.5px solid var(--gray-200);box-shadow:var(--shadow-sm)}.btn-secondary:hover{background:var(--gray-50);border-color:var(--gray-300)}
.btn-danger{background:#fff;color:var(--red);border:1.5px solid var(--red-border)}.btn-danger:hover{background:var(--red-light)}
.btn-ghost{background:none;border:none;color:var(--gray-500);cursor:pointer;padding:4px 8px;border-radius:7px;font-size:12px;font-weight:500}.btn-ghost:hover{background:var(--gray-100);color:var(--gray-700)}
.btn-add{background:var(--green-light);color:var(--green);border:1.5px solid var(--green-border)}.btn-add:hover{background:#dcfce7}.btn-add.active{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border-color:transparent}
.btn-lg{padding:12px 24px;font-size:14px;border-radius:10px}
.btn-pdf{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,.25)}.btn-pdf:hover{background:linear-gradient(135deg,#dc2626,#b91c1c);transform:translateY(-1px)}
.btn-xlsx{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.25)}.btn-xlsx:hover{background:linear-gradient(135deg,#16a34a,#15803d);transform:translateY(-1px)}

/* ── Upload ── */
.upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
@media(max-width:700px){.upload-grid{grid-template-columns:1fr}}
.drop-zone{border:2px dashed var(--gray-300);border-radius:12px;height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;text-align:center;padding:16px;user-select:none;background:var(--gray-50)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--blue);background:var(--blue-light);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.drop-zone input{display:none}
.drop-zone .dz-icon{font-size:36px;margin-bottom:10px;opacity:.7}
.drop-zone p{font-size:13px;font-weight:600;color:var(--gray-600)}
.drop-zone small{font-size:11px;color:var(--gray-400);margin-top:5px}
.preview-wrap{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--gray-200);box-shadow:var(--shadow-sm)}
.preview-wrap img{width:100%;height:190px;object-fit:cover;display:block}
.preview-ok{position:absolute;bottom:0;inset-x:0;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-size:11px;font-weight:600;text-align:center;padding:5px 6px;letter-spacing:.02em}
.preview-rm{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;font-weight:600;backdrop-filter:blur(4px)}
.slot-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-size:11px;font-weight:700;flex-shrink:0;box-shadow:0 2px 6px rgba(37,99,235,.3)}
.guide-toggle{font-size:11px;color:var(--blue);cursor:pointer;background:none;border:none;padding:0;font-weight:600;flex-shrink:0}
.guide-box{background:var(--blue-light);border:1px solid var(--blue-border);border-radius:10px;padding:12px;margin-top:8px;font-size:11px;color:#1e40af;line-height:1.5}
.guide-box li{display:flex;gap:6px;margin-bottom:4px}

/* ── Editor ── */
.editor-layout{display:flex;gap:14px}
@media(max-width:700px){.editor-layout{flex-direction:column}}
.canvas-wrap{flex:1;background:#111;border-radius:12px;border:1px solid var(--gray-200);overflow:hidden;position:relative;min-height:300px}
canvas{display:block}
.sidebar{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
@media(max-width:700px){.sidebar{width:100%}}
.lm-list{overflow-y:auto;max-height:400px;display:flex;flex-direction:column;gap:1px}
.lm-item{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid transparent;transition:background .1s}
.lm-item:hover{background:var(--gray-100)}.lm-item.sel{background:#eff6ff;border-color:var(--blue-border);color:#1d4ed8}
.lm-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lm-id{font-family:monospace;color:var(--gray-400);font-size:10px;min-width:36px}
.lm-name{color:var(--gray-700);font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lm-conf{font-size:10px;flex-shrink:0}
.cat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);padding:5px 7px 2px;display:flex;align-items:center;justify-content:space-between}
.detail-box{border:1px solid var(--gray-200);border-radius:8px;padding:10px;font-size:11px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.legend{display:flex;gap:8px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-700)}
.leg-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(0,0,0,.2)}
.cb-lbl{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-700);cursor:pointer;user-select:none}
.size-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray-600)}
.size-wrap input[type=range]{width:70px;accent-color:var(--blue)}
.add-banner{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;font-size:12px;color:#166534;display:flex;align-items:center;gap:8px}
.confirm-strip{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}
.det-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:12px;z-index:10}
.det-overlay p{color:#fff;font-size:13px;font-weight:500}
.add-picker{background:#fff;border:1px solid var(--gray-200);border-radius:8px;padding:8px;display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto}
.add-pick-item{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:11px;border:1px solid transparent}
.add-pick-item:hover{background:var(--blue-light);border-color:var(--blue-border);color:var(--blue)}
.add-pick-item.active{background:var(--blue);color:#fff}

/* ── Results ── */
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.results-grid{grid-template-columns:1fr}}
.rcard{background:#fff;border-radius:14px;border:1px solid var(--gray-200);padding:18px;box-shadow:var(--shadow-sm);transition:box-shadow .18s}
.rcard:hover{box-shadow:0 8px 24px rgba(37,99,235,.10),0 2px 8px rgba(0,0,0,.06);border-color:#dbeafe}
.rcard.wide{grid-column:span 2}
@media(max-width:700px){.rcard.wide{grid-column:span 1}}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--gray-100)}
.rcard h3{font-size:13px;font-weight:700;color:var(--gray-700);letter-spacing:.02em;text-transform:uppercase}
.meas-table{width:100%;border-collapse:collapse;font-size:12px}
.meas-table td{padding:6px 0;vertical-align:middle}
.meas-table td:first-child{color:var(--gray-600);padding-right:10px;width:58%;font-weight:500}
.meas-table td:nth-child(2){font-family:'Inter',monospace;font-weight:700;white-space:nowrap;color:var(--gray-900)}
.meas-table td:nth-child(3){color:var(--gray-400);font-size:11px;padding-left:8px}
.meas-table tr+tr td{border-top:1px solid var(--gray-50)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.02em}
.bn{background:linear-gradient(135deg,#dcfce7,#d1fae5);color:#15803d;border:1px solid #bbf7d0;box-shadow:0 1px 3px rgba(21,128,61,.12)}.bb{background:linear-gradient(135deg,#fef9c3,#fef3c7);color:#854d0e;border:1px solid #fde68a;box-shadow:0 1px 3px rgba(133,77,14,.10)}
.ba{background:linear-gradient(135deg,#fee2e2,#fecaca);color:#b91c1c;border:1px solid #fca5a5;box-shadow:0 1px 3px rgba(185,28,28,.10)}.bm{background:var(--gray-100);color:var(--gray-500);border:1px solid var(--gray-200)}
.thirds-bar{background:var(--gray-100);border-radius:999px;height:8px;overflow:hidden;margin-top:4px}
.class-I{background:#dcfce7;color:#15803d}.class-II{background:#fef9c3;color:#854d0e}.class-III{background:#fee2e2;color:#b91c1c}
.note-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;font-size:11px;color:#92400e;margin-top:10px;line-height:1.5}
.kf{background:linear-gradient(135deg,#eff6ff,#f0f9ff);border:1px solid #bfdbfe;border-radius:16px;padding:20px 24px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.kf h2{font-size:13px;font-weight:700;color:#1e40af;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:8px}
.kf-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;margin-bottom:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.7)}
.kf-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.kf-text{flex:1;line-height:1.5;font-weight:500}
.kf-text.normal{color:#15803d}.kf-text.borderline{color:#92400e}.kf-text.abnormal{color:#b91c1c}.kf-text.info{color:#1e40af}
.disclaimer{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:12px;padding:16px 18px;font-size:11px;color:var(--gray-500);margin-top:24px;line-height:1.7}
.pid-input{border:1.5px solid var(--gray-200);border-radius:8px;padding:7px 12px;font-size:14px;width:180px;outline:none;font-family:'Inter',monospace;font-weight:600}
.pid-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.error-banner{background:var(--red-light);border:1px solid var(--red-border);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--red);display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-weight:500}

/* ── Archive / Library ── */
.archive-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-top:20px}
.archive-card{background:#fff;border:1.5px solid var(--gray-200);border-radius:16px;padding:20px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.archive-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#3b82f6,#6366f1);opacity:0;transition:opacity .18s}
.archive-card:hover{border-color:#bfdbfe;box-shadow:0 8px 24px rgba(37,99,235,.12),0 2px 6px rgba(0,0,0,.06);transform:translateY(-3px)}.archive-card:hover::before{opacity:1}
.archive-pid{font-size:20px;font-weight:800;color:var(--gray-900);font-family:'Inter',monospace;letter-spacing:-.02em}
.archive-ts{font-size:11px;color:var(--gray-400);margin-top:3px;margin-bottom:12px;font-weight:500}
.archive-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.archive-del{position:absolute;top:12px;right:12px;background:none;border:none;font-size:14px;cursor:pointer;color:var(--gray-300);padding:5px;border-radius:7px;line-height:1;transition:all .15s}
.archive-del:hover{background:var(--red-light);color:var(--red)}
.archive-empty{text-align:center;padding:80px 20px;color:var(--gray-400)}
.archive-empty .empty-icon{font-size:56px;margin-bottom:14px;opacity:.6}
.archive-search{border:1.5px solid var(--gray-200);border-radius:10px;padding:9px 14px;font-size:13px;width:100%;max-width:340px;outline:none;font-weight:500;transition:border-color .15s}
.archive-search:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}

/* ── Branding watermark ── */
.branding{position:fixed;bottom:16px;right:18px;z-index:999;pointer-events:none;user-select:none;text-align:right}
.branding-inner{background:rgba(15,23,42,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.10);border-radius:10px;padding:8px 13px;display:inline-block}
.branding-line1{font-size:10px;color:rgba(255,255,255,.70);letter-spacing:.05em;font-weight:700;text-transform:uppercase;white-space:nowrap;line-height:1.6;display:block}
.branding-line2{font-size:9.5px;color:rgba(255,255,255,.38);letter-spacing:.05em;font-weight:500;text-transform:uppercase;white-space:nowrap;line-height:1.4;display:block;margin-top:1px}
.branding .heart{color:#fb7185;font-size:11px;vertical-align:middle}

/* ── Spinners ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 4px #22c55e;opacity:1}50%{box-shadow:0 0 10px #22c55e,0 0 18px rgba(34,197,94,.4);opacity:.85}}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.spinner-lg{width:40px;height:40px;border:4px solid var(--blue-border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{width:13px;height:13px;border:2px solid var(--gray-300);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}

/* ── Print ── */
@media print{
  .hdr,.pbar,.no-print{display:none!important}
  body{background:#fff;font-family:'Inter',system-ui,sans-serif}
  .main{padding:10mm 14mm;max-width:100%}
  .branding{position:fixed;bottom:6mm;right:8mm;pointer-events:none;text-align:right}
  .branding-inner{background:none;border:none;backdrop-filter:none;padding:0}
  .branding-line1{font-size:7.5pt;color:#94a3b8;font-weight:600;letter-spacing:.06em;text-transform:uppercase;display:block}
  .branding-line2{font-size:7pt;color:#cbd5e1;font-weight:500;letter-spacing:.05em;text-transform:uppercase;display:block;margin-top:1px}
  .branding .heart{color:#e11d48}
  .rcard,.kf,.disclaimer{break-inside:avoid;box-shadow:none!important;border:1px solid #e2e8f0!important}
  .rcard:hover{transform:none!important;box-shadow:none!important}
  .kf{background:#eff6ff!important}
  body{background:#fff}
  .results-grid{grid-template-columns:1fr 1fr}
  .rcard.wide{grid-column:span 2}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ── Archive (localStorage) ────────────────────────────────────────────────────
const ARCHIVE_KEY = 'ortho_archive_v1';
function loadArchive(){
  try{return JSON.parse(localStorage.getItem(ARCHIVE_KEY)||'[]');}catch{return [];}
}
function saveToArchive(record){
  const arr=loadArchive();
  const idx=arr.findIndex(r=>r.pid===record.pid);
  if(idx>=0) arr[idx]=record; else arr.unshift(record);
  localStorage.setItem(ARCHIVE_KEY,JSON.stringify(arr));
}
function deleteFromArchive(pid){
  const arr=loadArchive().filter(r=>r.pid!==pid);
  localStorage.setItem(ARCHIVE_KEY,JSON.stringify(arr));
}

// ── Thumbnail generation ────────────────────────────────────────────────────────
async function generateThumbnail(src,maxW=220){
  return new Promise(res=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      const s=maxW/img.naturalWidth;
      const c=document.createElement('canvas');
      c.width=maxW;c.height=Math.round(img.naturalHeight*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',.65));
    };
    img.onerror=()=>res(null);img.src=src;
  });
}

// ── Archive backup / restore ────────────────────────────────────────────────────
function exportArchiveBackup(){
  const json=JSON.stringify(loadArchive());
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`ortho_backup_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1e3);
}
function importArchiveBackup(file,onDone){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error('Not an array');
      const map=new Map(loadArchive().map(x=>[x.pid,x]));
      data.forEach(x=>{if(x.pid&&x.savedAt)map.set(x.pid,x);});
      const merged=[...map.values()].sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt));
      localStorage.setItem(ARCHIVE_KEY,JSON.stringify(merged));
      onDone(merged.length);
    }catch(ex){alert('Invalid backup file: '+ex.message);}
  };
  r.readAsText(file);
}

// ── Face detection — MediaPipe FaceLandmarker (Tasks Vision, 478 landmarks) ───
let _mpState='idle';
let _mpQ=[];
let _faceLP=null;
const _MP_CDN='https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';
const _MP_MODEL='https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task';

async function ensureMediaPipe(onStatus){
  if(_mpState==='ready') return true;
  if(_mpState==='failed') return false;
  if(_mpState==='loading') return new Promise(r=>_mpQ.push(r));
  _mpState='loading';
  try{
    onStatus?.('Loading AI model (first time only)…');
    // new Function bypasses Babel's import transform — uses native browser import()
    const _imp=new Function('u','return import(u)');
    const {FaceLandmarker,FilesetResolver}=await _imp(`${_MP_CDN}/vision_bundle.mjs`);
    onStatus?.('Initializing face landmark model…');
    const vision=await FilesetResolver.forVisionTasks(`${_MP_CDN}/wasm`);
    _faceLP=await FaceLandmarker.createFromOptions(vision,{
      baseOptions:{modelAssetPath:_MP_MODEL,delegate:'CPU'},
      runningMode:'IMAGE',
      numFaces:1,
      minFaceDetectionConfidence:.25,
      minFacePresenceScore:.25,
      outputFaceBlendshapes:false,
      outputFacialTransformationMatrixes:false,
    });
    _mpState='ready';
    _mpQ.forEach(r=>r(true));_mpQ=[];
    return true;
  }catch(e){
    console.warn('MediaPipe init failed:',e);
    _mpState='failed';
    _mpQ.forEach(r=>r(false));_mpQ=[];
    return false;
  }
}

// Map MediaPipe 478-point normalized landmarks → our app landmark IDs
// MediaPipe "left" = image-left = patient's right (camera perspective)
function mapMPtoLms(lms,W,H,photoType){
  const p=i=>({x:lms[i].x*W,y:lms[i].y*H});
  const mx=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
  if(photoType==='frontal'){
    // Glabella: midpoint of inner brow ends, shifted up toward forehead
    const ib=mx(p(107),p(336));
    const gl={x:ib.x,y:ib.y-Math.abs(p(168).y-ib.y)*.6};
    return[
      {id:'Gl', x:gl.x,          y:gl.y,                         c:.88},
      {id:'N',  x:p(168).x,      y:p(168).y,                     c:.93}, // nasion
      {id:'ExR',x:p(33).x,       y:p(33).y,                      c:.95}, // outer right canthus
      {id:'EnR',x:p(133).x,      y:p(133).y,                     c:.95}, // inner right canthus
      {id:'EnL',x:p(362).x,      y:p(362).y,                     c:.95}, // inner left canthus
      {id:'ExL',x:p(263).x,      y:p(263).y,                     c:.95}, // outer left canthus
      {id:'Prn',x:p(4).x,        y:p(4).y,                       c:.92}, // nasal tip
      {id:'AlR',x:p(129).x,      y:p(129).y,                     c:.88}, // right alar base
      {id:'AlL',x:p(358).x,      y:p(358).y,                     c:.88}, // left alar base
      {id:'Sn', x:p(2).x,        y:p(2).y+(p(13).y-p(2).y)*.45, c:.87}, // subnasale
      {id:'Ls', x:p(13).x,       y:p(13).y,                      c:.91}, // upper lip
      {id:'ChR',x:p(61).x,       y:p(61).y,                      c:.94}, // right mouth corner
      {id:'ChL',x:p(291).x,      y:p(291).y,                     c:.94}, // left mouth corner
      {id:'Li', x:p(14).x,       y:p(14).y,                      c:.91}, // lower lip
      {id:'Me', x:p(152).x,      y:p(152).y,                     c:.89}, // menton/chin
    ];
  }
  if(photoType==='profile'){
    // nose tip x > 0.5 → face points RIGHT in image
    const faceRight=lms[4].x>0.5;
    // dir: +1 = face points right, -1 = face points left
    // "posterior" (toward ear) = -dir; "anterior" (toward nose) = +dir
    const dir=faceRight?1:-1;

    const prn=p(4);      // pronasale — reliable in profile
    const meRaw=p(152);  // menton — y reliable, x may be off (MediaPipe projects inside face)
    const faceH=meRaw.y-prn.y;

    // Sanity check — if face height is implausible, bail out so caller uses anchor fallback
    if(faceH<H*0.06||faceH<=0) return null;

    // Clamp totFH to avoid wild values from noisy MediaPipe output in profile view
    const totFH=Math.max(H*0.30,Math.min(H*1.10,faceH/0.48)); // estimated full face height

    // Reliable silhouette landmarks from MediaPipe
    const sn=p(2);           // subnasale
    const ls=p(13);          // labrale superius (upper lip)
    const li=p(14);          // labrale inferius (lower lip)
    const sto=mx(ls,li);
    const cm=mx(prn,sn);

    // Me_p: y from MediaPipe (reliable), x calculated (MediaPipe x drifts off silhouette)
    const me={x:prn.x-dir*totFH*0.10, y:meRaw.y};

    // All other landmarks calculated proportionally from nose-tip + face-height
    // (MediaPipe indices for forehead, ear, chin-x are unreliable in true profile view)
    const nasion={x:prn.x-dir*totFH*0.030, y:prn.y-totFH*0.17};
    const gl    ={x:nasion.x+dir*totFH*0.015, y:nasion.y-totFH*0.08};
    const pog   ={x:me.x,                     y:me.y-totFH*0.05};
    const b_pt  ={x:li.x*0.20+pog.x*0.80,     y:li.y*0.20+pog.y*0.80};
    // Tragus: same horizontal level as nasal tip (not nasion!) — ear canal is at alar base height
    const tragus={x:prn.x-dir*totFH*0.46,     y:prn.y+totFH*0.06};

    return[
      {id:'Gl_p',  x:gl.x,     y:gl.y,     c:.65},
      {id:'N_p',   x:nasion.x, y:nasion.y, c:.70},
      {id:'Prn_p', x:prn.x,    y:prn.y,    c:.93},
      {id:'Cm',    x:cm.x,     y:cm.y,     c:.85},
      {id:'Sn_p',  x:sn.x,     y:sn.y,     c:.87},
      {id:'Ls_p',  x:ls.x,     y:ls.y,     c:.88},
      {id:'Sto',   x:sto.x,    y:sto.y,    c:.86},
      {id:'Li_p',  x:li.x,     y:li.y,     c:.88},
      {id:'B_p',   x:b_pt.x,   y:b_pt.y,  c:.68},
      {id:'Pog_p', x:pog.x,    y:pog.y,    c:.70},
      {id:'Me_p',  x:me.x,     y:me.y,     c:.80},
      {id:'T',     x:tragus.x, y:tragus.y, c:.65},
    ];
  }
  if(photoType==='smile'){
    const chR=p(61), chL=p(291);
    const mw=Math.abs(chL.x-chR.x);
    // p(82) / p(312): inner upper lip points slightly right/left of center — best upper incisal edge approx
    // p(87) / p(317): inner lower lip points slightly right/left of center — best lower incisal edge approx
    // Small offset: push inward from lip edge toward actual tooth incisal edge
    const toothOff=H*0.010;
    const uiR={x:p(82).x,  y:p(82).y +toothOff};  // upper right incisal edge
    const uiL={x:p(312).x, y:p(312).y+toothOff};  // upper left incisal edge
    const liR={x:p(87).x,  y:p(87).y -toothOff};  // lower right incisal edge
    const liL={x:p(317).x, y:p(317).y-toothOff};  // lower left incisal edge
    const llMid=p(17);  // lower lip midpoint
    // UDM: center x between the two upper central incisal edges
    const udm={x:(uiR.x+uiL.x)/2, y:(uiR.y+uiL.y)/2};
    // Buccal corridors: ~22% beyond mouth corners
    const bcR={x:chR.x-mw*0.22, y:chR.y};
    const bcL={x:chL.x+mw*0.22, y:chL.y};
    return[
      {id:'ChR_s', x:chR.x,  y:chR.y,   c:.95},
      {id:'ChL_s', x:chL.x,  y:chL.y,   c:.95},
      {id:'UI_R',  x:uiR.x,  y:uiR.y,   c:.88},
      {id:'UI_L',  x:uiL.x,  y:uiL.y,   c:.88},
      {id:'LI_R',  x:liR.x,  y:liR.y,   c:.88},
      {id:'LI_L',  x:liL.x,  y:liL.y,   c:.88},
      {id:'LL_mid',x:llMid.x,y:llMid.y,  c:.92},
      {id:'UDM_s', x:udm.x,  y:udm.y,   c:.85},
      {id:'BCR',   x:bcR.x,  y:bcR.y,   c:.75},
      {id:'BCL',   x:bcL.x,  y:bcL.y,   c:.75},
    ];
  }
  return null;
}

// Proportional profile landmark placement anchored on detected nose tip + face height.
// Used when MediaPipe detects the face but faceH fails the strict sanity check,
// giving far better placement than pure image-proportion defaults.
function profileFromAnchor(prnX,prnY,faceH,dir,W,H,defs){
  const totFH=Math.max(H*0.28,Math.min(H*1.0,faceH/0.48));
  const pt=(x,y)=>({x,y});
  const nasion=pt(prnX-dir*totFH*0.030, prnY-totFH*0.17);
  const gl    =pt(nasion.x+dir*totFH*0.015, nasion.y-totFH*0.08);
  const sn    =pt(prnX-dir*totFH*0.018,  prnY+totFH*0.082);
  const ls    =pt(prnX-dir*totFH*0.012,  prnY+totFH*0.155);
  const sto   =pt(prnX-dir*totFH*0.014,  prnY+totFH*0.185);
  const li    =pt(prnX-dir*totFH*0.010,  prnY+totFH*0.215);
  const me    =pt(prnX-dir*totFH*0.100,  prnY+totFH*0.48);
  const pog   =pt(me.x,                  me.y-totFH*0.05);
  const b_pt  =pt(li.x*0.20+pog.x*0.80, li.y*0.20+pog.y*0.80);
  const cm    =pt((prnX+sn.x)/2,         (prnY+sn.y)/2);
  const tragus=pt(prnX-dir*totFH*0.46,   prnY+totFH*0.06);
  const pts={Gl_p:gl,N_p:nasion,Prn_p:pt(prnX,prnY),Cm:cm,
             Sn_p:sn,Ls_p:ls,Sto:sto,Li_p:li,B_p:b_pt,Pog_p:pog,Me_p:me,T:tragus};
  return defs.map(d=>({
    ...d,
    x:pts[d.id]?pts[d.id].x:(dir>0?d.nx*W:(1-d.nx)*W),
    y:pts[d.id]?pts[d.id].y:d.ny*H,
    confidence:.68
  }));
}

async function detectAndRefine(imgEl, photoType, onStatus){
  const defs=LM_MAP[photoType];
  const W=imgEl.naturalWidth,H=imgEl.naturalHeight;
  // Direction-aware fallback for profile (LM_PROFILE nx/ny are defined for face-RIGHT)
  const profileFallback=(faceRight)=>defs.map(d=>({
    ...d,
    x: faceRight ? d.nx*W : (1-d.nx)*W,
    y: d.ny*H,
    confidence:.58
  }));
  const fallback=defs.map(d=>({...d,x:d.nx*W,y:d.ny*H,confidence:.55}));

  const ok=await ensureMediaPipe(onStatus);

  // ── Profile: special handling ──────────────────────────────────────────────
  if(photoType==='profile'){
    let faceRight=false; // clinical default: face points left (right profile view)
    if(ok){
      try{
        onStatus?.('Detecting face direction & landmarks…');
        const res=_faceLP.detect(imgEl);
        if(res.faceLandmarks?.length>0){
          const lms=res.faceLandmarks[0];
          faceRight=lms[4].x>0.5;
          const mapped=mapMPtoLms(lms,W,H,'profile');
          if(mapped){
            const defMap=Object.fromEntries(defs.map(d=>[d.id,d]));
            return mapped.map(lm=>({...defMap[lm.id],x:lm.x,y:lm.y,confidence:lm.c}));
          }
          // mapMPtoLms returned null (implausible faceH) — but we have nose tip from MediaPipe
          // Use it as an anchor for proportional placement (much better than image-proportion defaults)
          const prnX=lms[4].x*W, prnY=lms[4].y*H;
          const meY=lms[152].y*H;
          const detFH=meY-prnY;
          const estFH=detFH>H*0.05 ? detFH : H*0.42;
          onStatus?.('Anchor-based profile placement (nose tip anchor)');
          return profileFromAnchor(prnX,prnY,estFH,faceRight?1:-1,W,H,defs);
        }
      }catch(e){console.warn('Profile detect error:',e);}
    }
    // No detection at all — use default (face-left = right-profile, common in clinics)
    onStatus?.('Profile defaults — adjust direction with Flip ↔ if needed');
    return profileFallback(faceRight);
  }

  // ── Frontal & Smile ────────────────────────────────────────────────────────
  if(!ok) return fallback;
  try{
    onStatus?.('Detecting face landmarks…');
    const res=_faceLP.detect(imgEl);
    if(!res.faceLandmarks?.length){onStatus?.('No face found — using default positions');return fallback;}
    const lms=res.faceLandmarks[0];
    const mapped=mapMPtoLms(lms,W,H,photoType);
    if(!mapped) return fallback;
    const defMap=Object.fromEntries(defs.map(d=>[d.id,d]));
    return mapped.map(lm=>({...defMap[lm.id],x:lm.x,y:lm.y,confidence:lm.c}));
  }catch(e){
    console.warn('MediaPipe detect error:',e);
    return fallback;
  }
}


// ── Geometry & analysis helpers ────────────────────────────────────────────────
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function angleDeg(a,b,c){
  const ax=a.x-b.x,ay=a.y-b.y,cx=c.x-b.x,cy=c.y-b.y;
  const dot=ax*cx+ay*cy,ma=Math.hypot(ax,ay),mc=Math.hypot(cx,cy);
  if(!ma||!mc)return null;
  return Math.round(Math.acos(Math.max(-1,Math.min(1,dot/(ma*mc))))*180/Math.PI*10)/10;
}
function ptLineSigned(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,len=Math.hypot(dx,dy);
  if(!len)return 0;
  return((py-ay)*dx-(px-ax)*dy)/len;
}
function g(lms,id){return lms.find(l=>l.id===id)}
function r1(v){return v!==null&&v!==undefined?Math.round(v*10)/10:null}
// Determine face direction from profile landmarks (+1 = face-right, -1 = face-left).
// Uses Prn_p vs N_p: nose tip is always more anterior than nasion.
function getFaceDir(profile){
  const prn=g(profile,'Prn_p'),np=g(profile,'N_p'),me=g(profile,'Me_p');
  if(prn&&np) return prn.x>np.x?1:-1;
  if(prn&&me) return prn.x>me.x?1:-1;
  return -1; // default: face-left (most common clinical convention)
}

function calibScale(frontal,ipdMm){
  const exR=g(frontal,'ExR'),exL=g(frontal,'ExL');
  if(exR&&exL){const d=dist(exR,exL)*.70;if(d>0)return ipdMm/d}
  const alR=g(frontal,'AlR'),alL=g(frontal,'AlL');
  if(alR&&alL){const d=dist(alR,alL);if(d>0)return 35/d}
  return null;
}
function analyseSymmetry(frontal,sc){
  const gl=g(frontal,'Gl'),sn=g(frontal,'Sn'),me=g(frontal,'Me');
  const prn=g(frontal,'Prn'),alR=g(frontal,'AlR'),alL=g(frontal,'AlL');
  const chR=g(frontal,'ChR'),chL=g(frontal,'ChL'),enR=g(frontal,'EnR'),enL=g(frontal,'EnL');
  const mx=gl?gl.x:sn?sn.x:null;
  if(!mx)return{flag:'missing_data'};
  const chinDev=   (me&&sc)?r1(Math.abs(me.x-mx)*sc):null;
  const noseDev=   (prn&&sc)?r1(Math.abs(prn.x-mx)*sc):null;
  const alarAsym=  (alR&&alL&&sc)?r1(Math.abs((alR.x+alL.x)/2-mx)*sc):null;
  const mouthAsym= (chR&&chL&&sc)?r1(Math.abs((chR.x+chL.x)/2-mx)*sc):null;
  const canthAsym= (enR&&enL&&sc)?r1(Math.abs((enR.x+enL.x)/2-mx)*sc):null;
  const vals=[chinDev,noseDev,alarAsym,mouthAsym,canthAsym].filter(v=>v!==null);
  const flag=!vals.length?'missing_data':vals.some(v=>v>2)?'abnormal':vals.some(v=>v>1.5)?'borderline':'within_normal_limits';
  return{chinDev,noseDev,alarAsym,mouthAsym,canthAsym,flag};
}
function analyseThirds(frontal,sc){
  const gl=g(frontal,'Gl'),sn=g(frontal,'Sn'),me=g(frontal,'Me');
  if(!gl||!sn||!me)return{flag:'missing_data'};
  const total=me.y-gl.y;if(total<=0)return{flag:'missing_data'};
  const midPct=r1((sn.y-gl.y)/total*100),lowPct=r1((me.y-sn.y)/total*100),upPct=Math.max(0,r1(100-midPct-lowPct));
  const maxDev=Math.max(Math.abs(midPct-33.3),Math.abs(lowPct-33.3));
  return{upPct,midPct,lowPct,flag:maxDev>5?'abnormal':maxDev>3?'borderline':'within_normal_limits'};
}
function analyseSkeletal(profile,sc){
  const prn=g(profile,'Prn_p'),sn=g(profile,'Sn_p'),ls=g(profile,'Ls_p');
  const li=g(profile,'Li_p'),pog=g(profile,'Pog_p'),cm=g(profile,'Cm');
  const nasolabial=cm&&sn&&ls?angleDeg(cm,sn,ls):null;
  // fdir: +1=face-right, -1=face-left. Used to normalise sign convention so that
  // positive E-plane values always mean "anterior to E-line" (protrusive)
  // and positive pogSn always means "Pog in front of Sn vertical" (Class III direction).
  const fdir=getFaceDir(profile);
  let upperE=null,lowerE=null,pogSn=null;
  if(prn&&pog&&ls&&li&&sc){
    // ptLineSigned gives opposite sign for face-right vs face-left; multiply by -fdir to normalise.
    upperE=r1(-fdir*ptLineSigned(ls.x,ls.y,prn.x,prn.y,pog.x,pog.y)*sc);
    lowerE=r1(-fdir*ptLineSigned(li.x,li.y,prn.x,prn.y,pog.x,pog.y)*sc);
  }
  // pog.x-sn.x: positive=anterior for face-right, negative=anterior for face-left → multiply by fdir.
  if(pog&&sn&&sc)pogSn=r1(fdir*(pog.x-sn.x)*sc);
  let cls='Class I';
  if(lowerE!==null){if(lowerE>1)cls='Class III tendency';else if(lowerE<-4)cls='Class II tendency';}
  return{cls,nasolabial,upperE,lowerE,pogSn};
}
function analyseLip(profile,sc){
  const sn=g(profile,'Sn_p'),sto=g(profile,'Sto'),li=g(profile,'Li_p');
  const me=g(profile,'Me_p'),cm=g(profile,'Cm'),ls=g(profile,'Ls_p');
  const b=g(profile,'B_p'),pog=g(profile,'Pog_p'),prn=g(profile,'Prn_p');
  const mm=(v)=>v!==null&&sc?r1(v*sc):null;
  const ulLen=sn&&sto?mm(dist(sn,sto)):null;
  const llLen=sto&&me?mm(dist(sto,me)):null;
  const gap=ls&&li?Math.max(0,mm(li.y-ls.y)):null;
  const nasolabial=cm&&sn&&ls?angleDeg(cm,sn,ls):null;
  const mentolabial=li&&b&&pog?angleDeg(li,b,pog):null;
  const fdir=getFaceDir(profile);
  let upperE=null,lowerE=null;
  if(prn&&pog&&ls&&li&&sc){
    upperE=r1(-fdir*ptLineSigned(ls.x,ls.y,prn.x,prn.y,pog.x,pog.y)*sc);
    lowerE=r1(-fdir*ptLineSigned(li.x,li.y,prn.x,prn.y,pog.x,pog.y)*sc);
  }
  const flags=[];
  if(ulLen&&(ulLen<19||ulLen>24))flags.push(1);
  if(gap!==null&&gap>3)flags.push(1);
  if(nasolabial&&(nasolabial<90||nasolabial>110))flags.push(1);
  const flag=flags.length>=2?'abnormal':flags.length?'borderline':'within_normal_limits';
  return{ulLen,llLen,gap,nasolabial,mentolabial,upperE,lowerE,flag};
}
function analyseSmile(smile,sc){
  const uiR=g(smile,'UI_R'),uiL=g(smile,'UI_L');
  const chR=g(smile,'ChR_s'),chL=g(smile,'ChL_s'),bcR=g(smile,'BCR'),bcL=g(smile,'BCL');
  let arc='indeterminate';
  if(uiR&&uiL&&chR&&chL){
    const diff=(uiR.y+uiL.y)/2-(chR.y+chL.y)/2;
    const thresh=sc?3/sc:5;
    arc=diff>thresh?'consonant':diff>-thresh?'flat':'reverse';
  }
  let bcLeft=null,bcRight=null;
  if(chR&&chL&&bcR&&bcL){
    const sw=chL.x-chR.x;
    if(sw>0){bcRight=r1((chR.x-bcR.x)/sw*100);bcLeft=r1((bcL.x-chL.x)/sw*100);}
  }
  const bcFlags=[bcLeft,bcRight].filter(v=>v!==null&&(v<10||v>15)).length;
  const flag=arc==='reverse'||bcFlags===2?'abnormal':arc==='flat'||bcFlags?'borderline':'within_normal_limits';
  return{arc,bcLeft,bcRight,flag};
}
function analyseMidline(frontal,smile,sc){
  const gl=g(frontal,'Gl'),mx=gl?gl.x:null;
  const udm=g(smile,'UDM_s');
  const udmDev=udm&&mx&&sc?r1(Math.abs(udm.x-mx)*sc):null;
  const flag=udmDev&&udmDev>2?'abnormal':udmDev&&udmDev>1?'borderline':'within_normal_limits';
  return{udmDev,ldmDev:null,shift:null,flag};
}
function analyseOJ(smile,sc){
  const uiR=g(smile,'UI_R'),uiL=g(smile,'UI_L'),liR=g(smile,'LI_R'),liL=g(smile,'LI_L');
  let oj=null,ob=null;
  if(uiR&&liR&&uiL&&liL&&sc){
    oj=r1((Math.abs(uiR.x-liR.x)+Math.abs(uiL.x-liL.x))/2*sc);
    ob=r1(((liR.y-uiR.y)+(liL.y-uiL.y))/2*sc);
  }
  const ojCls=oj===null?'not_measured':oj<0?'reverse':oj<1?'edge_to_edge':oj<=4?'normal':oj<=6?'increased':'severely_increased';
  const obCls=ob===null?'not_measured':ob<0?'open_bite':ob<1?'edge_to_edge':ob<=4?'normal':ob<=6?'increased':'severely_increased';
  return{oj,ob,ojCls,obCls};
}
function doAnalyse(confirmed,ipdMm){
  const sc=calibScale(confirmed.frontal,ipdMm);
  const sym=analyseSymmetry(confirmed.frontal,sc);
  const thirds=analyseThirds(confirmed.frontal,sc);
  const skel=analyseSkeletal(confirmed.profile,sc);
  const lip=analyseLip(confirmed.profile,sc);
  const smile=analyseSmile(confirmed.smile,sc);
  const mid=analyseMidline(confirmed.frontal,confirmed.smile,sc);
  const oj=analyseOJ(confirmed.smile,sc);
  const findings=[];
  const add=(text,level)=>findings.push({text,level});
  if(sym.flag==='abnormal') add(`Facial asymmetry: chin deviation ${sym.chinDev} mm (threshold 2 mm).`,'abnormal');
  else if(sym.flag==='borderline') add(`Mild facial asymmetry noted.`,'borderline');
  else if(sym.flag==='within_normal_limits') add(`Facial symmetry: within normal limits.`,'normal');
  if(thirds.flag!=='within_normal_limits') add(`Facial thirds imbalance: middle ${thirds.midPct}%, lower ${thirds.lowPct}% (ideal 33.3%).`,thirds.flag);
  else add(`Facial thirds: balanced (≈33% each).`,'normal');
  if(skel.cls) add(`Soft-tissue skeletal estimate: ${skel.cls}.`,skel.cls==='Class I'?'normal':skel.cls.includes('III')?'abnormal':'borderline');
  if(lip.flag!=='within_normal_limits'&&lip.gap!==null&&lip.gap>3) add(`Lip incompetence: interlabial gap ${lip.gap} mm at rest (norm 0–3 mm).`,lip.flag);
  else if(lip.flag==='within_normal_limits') add(`Lip competence: within normal limits.`,'normal');
  if(smile.arc==='flat'||smile.arc==='reverse') add(`Smile arc: ${smile.arc} (consonant preferred).`,smile.arc==='reverse'?'abnormal':'borderline');
  else if(smile.arc==='consonant') add(`Smile arc: consonant (aesthetic ideal).`,'normal');
  if(mid.flag!=='within_normal_limits') add(`Dental midline: UDM ${mid.udmDev??'—'} mm from facial midline.`,mid.flag);
  if(oj.ojCls!=='normal'&&oj.ojCls!=='not_measured') add(`Overjet estimate: ${oj.oj} mm — ${oj.ojCls.replace(/_/g,' ')}.`,oj.ojCls.includes('severe')?'abnormal':'borderline');
  if(!findings.length) add('All assessed parameters are within normal limits.','normal');
  return{sym,thirds,skel,lip,smile,mid,oj,findings,scale:sc,ts:new Date().toLocaleString()};
}

  row('Interlabial gap (rest)',report.lip.gap,'0–3 mm','mm');
  row('Nasolabial angle',report.lip.nasolabial,'90–110°','°');
  row('Mentolabial fold angle',report.lip.mentolabial,'120–135°','°');
  row('Upper lip to E-plane',report.lip.upperE,'−4 mm','mm');
  row('Lower lip to E-plane',report.lip.lowerE,'−2 mm','mm');
  row('Lip competence assessment',report.lip.flag?.replace(/_/g,' '));
  rows.push({Measurement:'',Value:'',Normal_Range:''});

  rows.push({Measurement:'=== SMILE ===',Value:'',Normal_Range:''});
  row('Smile arc',report.smile.arc,'Consonant preferred');
  row('Buccal corridor — left',report.smile.bcLeft,'10–15%','%');
  row('Buccal corridor — right',report.smile.bcRight,'10–15%','%');
  rows.push({Measurement:'',Value:'',Normal_Range:''});

  rows.push({Measurement:'=== MIDLINE ===',Value:'',Normal_Range:''});
  row('Upper dental midline deviation',report.mid.udmDev,'< 1 mm','mm');
  rows.push({Measurement:'',Value:'',Normal_Range:''});

  rows.push({Measurement:'=== OVERJET / OVERBITE ===',Value:'',Normal_Range:''});
  row('Overjet (photographic estimate)',report.oj.oj,'2–4 mm','mm');
  row('Overjet classification',report.oj.ojCls?.replace(/_/g,' '));
  row('Overbite (photographic estimate)',report.oj.ob,'2–4 mm','mm');
  row('Overbite classification',report.oj.obCls?.replace(/_/g,' '));
  rows.push({Measurement:'',Value:'',Normal_Range:''});

  rows.push({Measurement:'=== DISCLAIMER ===',Value:'This analysis is intended to assist clinical assessment and does not replace the judgment of a qualified orthodontist.',Normal_Range:''});

  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:40},{wch:22},{wch:28}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Analysis');
  XLSX.writeFile(wb,`OrthoAnalysis_${pid}_${new Date().toLocaleDateString('en-GB').replace(/\//g,'-')}.xlsx`);
