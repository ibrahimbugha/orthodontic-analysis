// ── Landmark Editor ────────────────────────────────────────────────────────────
const BASE_R=5;
function LandmarkEditor({photoType,imageUrl,imgW,imgH,onConfirm,onBack,initialLms}){
  const defs=LM_MAP[photoType];
  const [lms,setLms]=useState(()=>initialLms||defs.map(d=>({...d,x:d.nx*imgW,y:d.ny*imgH,confidence:.60})));
  const [origLms]=useState(()=>initialLms||defs.map(d=>({...d,x:d.nx*imgW,y:d.ny*imgH})));
  const [sel,setSel]=useState(null);
  const [hover,setHover]=useState(null);
  const [showLabels,setShowLabels]=useState(true);
  const [showMidline,setShowMidline]=useState(photoType==='frontal');
  const [showGolden,setShowGolden]=useState(false);
  const [drag,setDrag]=useState(null);
  const [dotSize,setDotSize]=useState(1.0);
  const [zoom,setZoom]=useState(1.0);
  const [pan,setPan]=useState({x:0,y:0});
  const [panDrag,setPanDrag]=useState(null);
  const [mode,setMode]=useState('normal');
  const [addPick,setAddPick]=useState(null);
  const [detecting,setDetecting]=useState(!initialLms);
  const [detectMsg,setDetectMsg]=useState('');
  const canvasRef=useRef(null),imgRef=useRef(null),drawAllRef=useRef(null),wrapRef=useRef(null);
  const [canvasW,setCanvasW]=useState(560);

  useEffect(()=>{
    if(!wrapRef.current)return;
    const ro=new ResizeObserver(([e])=>setCanvasW(Math.max(280,e.contentRect.width)));
    ro.observe(wrapRef.current);return()=>ro.disconnect();
  },[]);

  const sc=Math.min(canvasW/imgW,(canvasW*.74)/imgH);
  const dw=imgW*sc,dh=imgH*sc,ox=(canvasW-dw)/2,oy=0;
  const baseH=Math.round(dh);
  // Viewport approach: canvas stays fixed size, zoom+pan shift what's drawn inside it
  const zsc=sc*zoom,zdw=dw*zoom,zdh=dh*zoom;
  const zox=Math.round(ox*zoom)+pan.x, zoy=pan.y;
  const cvW=canvasW, cvH=baseH;
  const pointR=Math.max(2,Math.round(BASE_R*dotSize));
  const toCanvas=(lm)=>({cx:zox+lm.x*zsc,cy:zoy+lm.y*zsc});
  const toImg=(cx,cy)=>({x:(cx-zox)/zsc,y:(cy-zoy)/zsc});

  function drawAll(){
    const cvs=canvasRef.current;if(!cvs)return;
    const ctx=cvs.getContext('2d');
    ctx.clearRect(0,0,cvW,cvH);
    const img=imgRef.current;
    if(img?.complete&&img?.naturalWidth) ctx.drawImage(img,zox,zoy,zdw,zdh);
    else{ctx.fillStyle='#1e293b';ctx.fillRect(0,0,cvW,cvH);}

    if(showMidline&&photoType==='frontal'){
      const pts=['Gl','N','Sn','Me'].map(id=>lms.find(l=>l.id===id)).filter(Boolean);
      if(pts.length>=2){
        ctx.save();ctx.setLineDash([5,4]);ctx.strokeStyle='rgba(255,255,255,.75)';ctx.lineWidth=1.5;
        ctx.beginPath();pts.forEach((p,i)=>{const{cx,cy}=toCanvas(p);i?ctx.lineTo(cx,cy):ctx.moveTo(cx,cy);});
        ctx.stroke();ctx.restore();
      }
    }
    if(showGolden){
      ctx.save();ctx.globalAlpha=.55;
      const gl=lms.find(l=>l.id==='Gl'||l.id==='Gl_p'),me=lms.find(l=>l.id==='Me'||l.id==='Me_p');
      const exR=lms.find(l=>l.id==='ExR'),exL=lms.find(l=>l.id==='ExL');
      if(gl&&me){
        const fh=toCanvas(me).cy-toCanvas(gl).cy,ty=toCanvas(gl).cy;
        ctx.strokeStyle='rgba(255,215,0,.9)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
        [ty,ty+fh/3,ty+fh*2/3,ty+fh].forEach(y=>{ctx.beginPath();ctx.moveTo(zox,y);ctx.lineTo(zox+zdw,y);ctx.stroke();});
        ctx.fillStyle='rgba(255,215,0,.9)';ctx.font='10px sans-serif';ctx.setLineDash([]);
        ctx.fillText('Upper 1/3',zox+4,ty+fh/6);ctx.fillText('Middle 1/3',zox+4,ty+fh/2);ctx.fillText('Lower 1/3',zox+4,ty+fh*5/6);
        const phi=1.618,phiY=ty+fh/phi;
        ctx.strokeStyle='rgba(255,100,200,.9)';ctx.lineWidth=2;ctx.setLineDash([]);
        ctx.beginPath();ctx.moveTo(zox,phiY);ctx.lineTo(zox+zdw,phiY);ctx.stroke();
        ctx.fillStyle='rgba(255,100,200,.9)';ctx.font='10px sans-serif';ctx.fillText('φ',zox+4,phiY-3);
      }
      if(photoType==='frontal'&&exR&&exL){
        const xR=toCanvas(exR).cx,xL=toCanvas(exL).cx,fw=xL-xR;
        ctx.strokeStyle='rgba(100,200,255,.85)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
        [xR-fw/2,xR,xR+fw/2,xL,xL+fw/2].forEach(x=>{ctx.beginPath();ctx.moveTo(x,zoy);ctx.lineTo(x,zoy+zdh);ctx.stroke();});
      }
      ctx.restore();
    }
    lms.forEach(lm=>{
      const{cx,cy}=toCanvas(lm),col=CATS[lm.cat]||CATS.soft_tissue;
      const isSel=lm.id===sel,isHov=lm.id===hover;
      const r=isSel?pointR*1.7:isHov?pointR*1.4:pointR;
      ctx.save();
      if(isHov&&!isSel){ctx.beginPath();ctx.arc(cx,cy,r+3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.22)';ctx.fill();}
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=col.fill;ctx.fill();
      ctx.strokeStyle=isSel?'#fff':col.stroke;ctx.lineWidth=isSel?2:1.5;ctx.stroke();
      if(showLabels){
        ctx.font=`bold ${Math.max(8,pointR*1.8)}px monospace`;ctx.fillStyle='#fff';
        ctx.shadowColor='#000';ctx.shadowBlur=3;ctx.shadowOffsetX=1;ctx.shadowOffsetY=1;
        ctx.fillText(lm.id,cx+r+3,cy+4);ctx.shadowColor='transparent';
      }
      ctx.restore();
    });
  }
  drawAllRef.current=drawAll;

  useEffect(()=>{const img=new Image();img.src=imageUrl;imgRef.current=img;img.onload=()=>drawAllRef.current?.();},[imageUrl]);
  useEffect(()=>{drawAll();},[lms,sel,hover,showLabels,showMidline,showGolden,canvasW,dotSize,mode,zoom,pan]);

  useEffect(()=>{
    if(initialLms){setDetecting(false);return;}
    setDetecting(true);
    const img=new Image();img.src=imageUrl;
    img.onload=async()=>{const r=await detectAndRefine(img,photoType,msg=>setDetectMsg(msg));setLms(r);setDetecting(false);setDetectMsg('');};
    img.onerror=()=>setDetecting(false);
  },[]);

  useEffect(()=>{
    const cvs=canvasRef.current;if(!cvs)return;
    // Prevent page scroll during both point-drag and canvas-pan gestures.
    const fn=(e)=>{if(drag||panDrag)e.preventDefault();};
    cvs.addEventListener('touchmove',fn,{passive:false});return()=>cvs.removeEventListener('touchmove',fn);
  },[drag,panDrag]);

  useEffect(()=>{
    function onKey(e){
      if((e.key==='Delete'||e.key==='Backspace')&&sel&&document.activeElement.tagName!=='INPUT'){
        e.preventDefault();setLms(prev=>prev.filter(l=>l.id!==sel));setSel(null);
      }
      if(e.key==='Escape'){setMode('normal');setAddPick(null);setSel(null);}
    }
    window.addEventListener('keydown',onKey);return()=>window.removeEventListener('keydown',onKey);
  },[sel]);

  function hitTest(mx,my){
    const hitR=Math.max(10,pointR*2.5);
    return lms.slice().reverse().find(lm=>{const{cx,cy}=toCanvas(lm);return Math.hypot(mx-cx,my-cy)<hitR;});
  }
  function getPos(e){
    const rect=canvasRef.current.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
    return{mx:t.clientX-rect.left,my:t.clientY-rect.top};
  }
  function onDown(e){
    e.preventDefault();const{mx,my}=getPos(e);const hit=hitTest(mx,my);
    if(mode==='add'&&addPick&&!hit){
      const{x,y}=toImg(mx,my);const xi=Math.max(0,Math.min(imgW,x)),yi=Math.max(0,Math.min(imgH,y));
      setLms(prev=>{const exists=prev.find(l=>l.id===addPick.id);
        if(exists)return prev.map(l=>l.id===addPick.id?{...l,x:xi,y:yi,confidence:1.0}:l);
        return [...prev,{...addPick,x:xi,y:yi,confidence:1.0}];});
      setSel(addPick.id);return;
    }
    if(hit){setSel(hit.id);setDrag({id:hit.id});if(canvasRef.current)canvasRef.current.style.cursor='grabbing';}
    else{setSel(null);if(zoom>1.0)setPanDrag({sx:mx,sy:my,px:pan.x,py:pan.y});if(canvasRef.current)canvasRef.current.style.cursor=zoom>1.0?'grabbing':'default';}
  }
  function onMove(e){
    const{mx,my}=getPos(e);
    if(drag){
      const cxC=Math.max(zox,Math.min(zox+zdw,mx)),cyC=Math.max(zoy,Math.min(zoy+zdh,my));
      const{x,y}=toImg(cxC,cyC);
      setLms(prev=>prev.map(lm=>lm.id===drag.id?{...lm,x,y}:lm));
    }else if(panDrag){
      const nx=panDrag.px+(mx-panDrag.sx),ny=panDrag.py+(my-panDrag.sy);
      // Clamp: keep at least 80px of image visible in viewport
      const margin=80,imgLeft0=Math.round(ox*zoom);
      const minX=margin-imgLeft0-zdw, maxX=cvW-margin-imgLeft0;
      const minY=margin-zdh,          maxY=cvH-margin;
      setPan({x:Math.max(minX,Math.min(maxX,nx)),y:Math.max(minY,Math.min(maxY,ny))});
    }else{
      const hit=hitTest(mx,my),hid=hit?.id??null;
      if(hid!==hover)setHover(hid);
      if(canvasRef.current)canvasRef.current.style.cursor=mode==='add'?'crosshair':hit?'grab':zoom>1.0?'grab':'default';
    }
  }
  function onUp(){setDrag(null);setPanDrag(null);if(canvasRef.current)canvasRef.current.style.cursor=mode==='add'?'crosshair':zoom>1.0?'grab':'default';}

  // Keep a ref to the latest wheel handler so the non-passive useEffect never goes stale.
  const onWheelRef=useRef(null);
  onWheelRef.current=function(e){
    e.preventDefault(); // works because listener is registered as non-passive below
    const{mx,my}=getPos(e);
    const factor=e.deltaY<0?1.15:1/1.15;
    const nz=Math.max(0.5,Math.min(4.0,+(zoom*factor).toFixed(3)));
    if(nz<=1.0){setZoom(1.0);setPan({x:0,y:0});return;}
    // Zoom toward the mouse cursor: keep the image-pixel under the cursor fixed.
    const zoxOld=Math.round(ox*zoom)+pan.x;
    const zoyOld=pan.y;
    const ratio=nz/zoom;
    const newZox=mx-(mx-zoxOld)*ratio;
    const newZoy=my-(my-zoyOld)*ratio;
    setZoom(nz);
    setPan({x:newZox-Math.round(ox*nz),y:newZoy});
  };
  // Register as non-passive so e.preventDefault() actually stops page scroll.
  // React's synthetic onWheel is passive in modern browsers and cannot prevent scroll.
  useEffect(()=>{
    const cvs=canvasRef.current;if(!cvs)return;
    const fn=(e)=>onWheelRef.current(e);
    cvs.addEventListener('wheel',fn,{passive:false});
    return()=>cvs.removeEventListener('wheel',fn);
  },[]);

  const movedCount=lms.filter(lm=>{const o=origLms.find(ol=>ol.id===lm.id);return o&&(Math.abs(lm.x-o.x)>1||Math.abs(lm.y-o.y)>1);}).length;
  const byCategory={};
  lms.forEach(lm=>{if(!byCategory[lm.cat])byCategory[lm.cat]=[];byCategory[lm.cat].push(lm);});
  const placedIds=new Set(lms.map(l=>l.id)),unplaced=defs.filter(d=>!placedIds.has(d.id));
  const label=PHOTO_CONFIGS.find(p=>p.id===photoType)?.label||photoType;

  return(
    <div className="main" style={{maxWidth:1060}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <h1 style={{fontSize:19,fontWeight:700,color:'var(--gray-900)'}}>Confirm Landmarks — {label}</h1>
          <p style={{fontSize:13,color:'var(--gray-500)',marginTop:3}}>
            {detecting&&<><span className="spinner-sm" style={{marginRight:5}}/><span style={{color:'var(--blue)'}}>AI detecting landmarks…</span></>}
            {!detecting&&movedCount>0&&<span style={{color:'var(--amber)',fontWeight:600}}>{movedCount} point{movedCount>1?'s':''} adjusted</span>}
            {!detecting&&movedCount===0&&<span style={{color:'var(--green)'}}>Auto-placed — drag to refine</span>}
          </p>
        </div>
        <button className="btn btn-secondary" style={{fontSize:12}} onClick={onBack}>← Back</button>
      </div>
      <div className="card" style={{marginBottom:10,padding:'10px 14px'}}>
        <div className="toolbar">
          <div className="legend">
            {Object.entries(CATS).map(([k,v])=>(
              <div key={k} className="leg-item"><span className="leg-dot" style={{background:v.fill,borderColor:v.stroke}}/>{v.label}</div>
            ))}
          </div>
          <div className="size-wrap" style={{marginLeft:'auto'}}>
            <span>Size</span>
            <input type="range" min="33" max="100" value={Math.round(dotSize*100)} onChange={e=>setDotSize(Number(e.target.value)/100)}/>
            <span style={{width:28}}>{Math.round(dotSize*100)}%</span>
          </div>
          <label className="cb-lbl"><input type="checkbox" checked={showLabels} onChange={e=>setShowLabels(e.target.checked)} style={{accentColor:'var(--blue)'}}/>Labels</label>
          {photoType==='frontal'&&<label className="cb-lbl"><input type="checkbox" checked={showMidline} onChange={e=>setShowMidline(e.target.checked)} style={{accentColor:'var(--blue)'}}/>Midline</label>}
          <label className="cb-lbl"><input type="checkbox" checked={showGolden} onChange={e=>setShowGolden(e.target.checked)} style={{accentColor:'#f59e0b'}}/><span style={{color:'#92400e'}}>Golden ratio</span></label>
          {photoType==='profile'&&<button className="btn btn-secondary" style={{fontSize:11,padding:'3px 10px',marginLeft:6}} title="Mirror all landmarks horizontally" onClick={()=>setLms(prev=>prev.map(l=>({...l,x:imgW-l.x})))}>Flip ↔</button>}
          <div style={{display:'flex',alignItems:'center',gap:4,marginLeft:8,background:'var(--gray-100)',borderRadius:6,padding:'2px 6px'}}>
            <button className="btn btn-secondary" style={{fontSize:14,padding:'0 7px',minWidth:26,lineHeight:'22px'}} title="Zoom out (or scroll wheel)" onClick={()=>{setZoom(z=>{const nz=Math.max(0.5,+(z/1.25).toFixed(2));if(nz<=1.0)setPan({x:0,y:0});return nz;});}}>−</button>
            <span style={{fontSize:11,minWidth:38,textAlign:'center',fontWeight:600,color:'var(--gray-700)'}}>{Math.round(zoom*100)}%</span>
            <button className="btn btn-secondary" style={{fontSize:14,padding:'0 7px',minWidth:26,lineHeight:'22px'}} title="Zoom in (or scroll wheel)" onClick={()=>setZoom(z=>Math.min(4.0,+(z*1.25).toFixed(2)))}>+</button>
            {zoom!==1.0&&<button className="btn-ghost" style={{fontSize:10,color:'var(--gray-500)',padding:'0 4px'}} onClick={()=>{setZoom(1.0);setPan({x:0,y:0});}}>1:1</button>}
          </div>
        </div>
      </div>
      {mode==='add'&&(
        <div className="add-banner" style={{marginBottom:10}}>
          <span>✚ Add mode</span>
          {addPick?<span>Click on the image to place <strong>{addPick.name}</strong></span>:<span>Select a landmark from the list below</span>}
          <button className="btn-ghost" style={{marginLeft:'auto'}} onClick={()=>{setMode('normal');setAddPick(null);}}>✕ Cancel</button>
        </div>
      )}
      <div className="editor-layout">
        <div className="canvas-wrap" ref={wrapRef}>
          {detecting&&(
            <div className="det-overlay">
              <div className="spinner-lg" style={{borderColor:'rgba(255,255,255,.3)',borderTopColor:'#fff'}}/>
              <p>{detectMsg||'Detecting landmarks…'}</p>
              <p style={{fontSize:11,opacity:.7}}>MediaPipe 478-point AI landmark model</p>
            </div>
          )}
          <canvas ref={canvasRef} width={cvW} height={cvH}
            onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
            onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
            style={{display:'block'}}/>
        </div>
        <div className="sidebar">
          <div className="card" style={{padding:10}}>
            <div className="cat-lbl" style={{paddingLeft:0}}><span>Actions</span></div>
            <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
              <button className={`btn btn-add${mode==='add'?' active':''}`} style={{fontSize:11,padding:'5px 10px'}} onClick={()=>setMode(m=>m==='add'?'normal':'add')}>✚ Add</button>
              <button className="btn btn-danger" style={{fontSize:11,padding:'5px 10px'}} disabled={!sel} onClick={()=>{if(sel){setLms(prev=>prev.filter(l=>l.id!==sel));setSel(null);}}}>🗑 Delete</button>
            </div>
            {mode==='add'&&unplaced.length>0&&(
              <div className="add-picker" style={{marginTop:8}}>
                <p style={{fontSize:10,color:'var(--gray-400)',padding:'0 2px 4px'}}>Missing landmarks</p>
                {unplaced.map(d=>(
                  <div key={d.id} className={`add-pick-item${addPick?.id===d.id?' active':''}`} onClick={()=>setAddPick(d)}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:CATS[d.cat]?.fill,flexShrink:0,display:'inline-block'}}/>
                    <span style={{fontFamily:'monospace',fontSize:10,minWidth:36}}>{d.id}</span>{d.name}
                  </div>
                ))}
              </div>
            )}
          </div>
          <div className="card" style={{padding:10,flex:1}}>
            <p className="cat-lbl" style={{paddingLeft:0,marginBottom:4}}>Landmarks ({lms.length})</p>
            <div className="lm-list">
              {Object.entries(byCategory).map(([cat,items])=>(
                <div key={cat}>
                  <p className="cat-lbl">{CATS[cat]?.label||cat}</p>
                  {items.map(lm=>{
                    const conf=Math.round((lm.confidence||.6)*100);
                    const cc=conf>=80?'#16a34a':conf>=65?'#d97706':'#94a3b8';
                    return(
                      <div key={lm.id} className={`lm-item${sel===lm.id?' sel':''}`} onClick={()=>setSel(sel===lm.id?null:lm.id)}>
                        <span className="lm-dot" style={{background:CATS[lm.cat]?.fill}}/>
                        <span className="lm-id">{lm.id}</span>
                        <span className="lm-name">{lm.name}</span>
                        <span className="lm-conf" style={{color:cc}}>{conf}%</span>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
          {sel&&(()=>{
            const lm=lms.find(l=>l.id===sel),orig=origLms.find(l=>l.id===sel);
            const moved=orig&&(Math.abs(lm.x-orig.x)>1||Math.abs(lm.y-orig.y)>1);
            return lm?(
              <div className="detail-box">
                <strong style={{color:'var(--gray-800)',fontSize:12}}>{lm.name}</strong>
                {lm.desc&&(
                  <div style={{marginTop:6,padding:'6px 8px',background:'var(--blue-50,#eff6ff)',borderRadius:6,borderLeft:'3px solid var(--blue)'}}>
                    {lm.desc.split('\n').map((line,i)=>(
                      <p key={i} style={{fontSize:11,color:i===0?'#1e40af':'#374151',lineHeight:1.45,marginBottom:i===0?3:0,fontWeight:i===0?500:400,direction:i===0?'rtl':'ltr',textAlign:i===0?'right':'left'}}>{line}</p>
                    ))}
                  </div>
                )}
                <p style={{color:'var(--gray-500)',marginTop:4,fontFamily:'monospace',fontSize:10}}>x:{lm.x.toFixed(0)} y:{lm.y.toFixed(0)}</p>
                <p style={{color:'var(--gray-400)',fontSize:10}}>Conf: {Math.round((lm.confidence||.6)*100)}%</p>
                <div style={{display:'flex',gap:5,marginTop:6,flexWrap:'wrap'}}>
                  {moved&&orig&&<button className="btn-ghost" style={{fontSize:10,color:'var(--blue)'}} onClick={()=>setLms(prev=>prev.map(l=>l.id===sel?{...l,x:orig.x,y:orig.y}:l))}>↩ Reset</button>}
                  <button className="btn btn-danger" style={{fontSize:10,padding:'3px 8px'}} onClick={()=>{setLms(prev=>prev.filter(l=>l.id!==sel));setSel(null);}}>🗑 Delete</button>
                </div>
              </div>
            ):null;
          })()}
        </div>
      </div>
      <div className="confirm-strip no-print">
        <div>
          <p style={{fontWeight:600,color:'var(--green)',fontSize:13}}>✅ {lms.length} landmarks ready to confirm</p>
          <p style={{fontSize:11,color:'#166534',marginTop:2}}>Drag to correct · Add/Delete with buttons · Del key removes selected</p>
        </div>
        <button className="btn btn-primary btn-lg" onClick={()=>onConfirm(lms)}>Confirm Landmarks →</button>
      </div>
    </div>
  );
}

// ── Upload Slot ────────────────────────────────────────────────────────────────
function Slot({config,num,file,preview,onFile,onRemove}){
  const [open,setOpen]=useState(false);
  const [drag,setDrag]=useState(false);
  const ref=useRef();
  function accept(f){if(!f||!f.type.startsWith('image/'))return;onFile(f);}
  return(
    <div className="card" style={{display:'flex',flexDirection:'column',gap:8}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
        <div style={{display:'flex',gap:7,alignItems:'flex-start'}}>
          <span className="slot-num">{num}</span>
          <div><p style={{fontWeight:600,fontSize:13}}>{config.label}</p><p style={{fontSize:11,color:'var(--gray-500)',marginTop:1}}>{config.desc}</p></div>
        </div>
        <button className="guide-toggle" onClick={()=>setOpen(v=>!v)}>{open?'Hide':'Guide'}</button>
      </div>
      {open&&<div className="guide-box"><p style={{fontWeight:600,marginBottom:5}}>⚠️ Photo quality affects accuracy</p><ul style={{listStyle:'none',padding:0}}>{config.guide.map((g,i)=><li key={i}><span>•&nbsp;</span><span>{g}</span></li>)}</ul></div>}
      {file?(
        <div className="preview-wrap">
          <img src={preview} alt={config.label}/>
          <span className="preview-ok">✓ {file.name}</span>
          <button className="preview-rm" onClick={onRemove}>Remove</button>
        </div>
      ):(
        <div className={`drop-zone${drag?' dragover':''}`} onClick={()=>ref.current.click()}
          onDragEnter={e=>{e.preventDefault();setDrag(true)}} onDragOver={e=>{e.preventDefault();setDrag(true)}}
          onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);accept(e.dataTransfer.files[0]);}}>
          <input ref={ref} type="file" accept="image/jpeg,image/png,image/webp" onChange={e=>e.target.files[0]&&accept(e.target.files[0])}/>
          <div className="dz-icon">{drag?'📥':'📷'}</div>
          <p>{drag?'Drop here':'Drag & drop or click'}</p>
          <small>JPEG · PNG · WebP</small>
        </div>
      )}
    </div>
  );
}

// ── Report components ──────────────────────────────────────────────────────────
function Badge({flag}){
  const cls={within_normal_limits:'bn',borderline:'bb',abnormal:'ba',missing_data:'bm'}[flag]||'bm';
  const lbl={within_normal_limits:'Normal',borderline:'Borderline',abnormal:'Abnormal',missing_data:'No data'}[flag]||flag;
  return <span className={`badge ${cls}`}>{lbl}</span>;
}
function Row({label,val,norm,unit='mm'}){
  if(val==null)return null;
  return(<tr><td>{label}</td><td>{typeof val==='number'?val.toFixed(1):val}{typeof val==='number'?` ${unit}`:''}</td><td>{norm}</td></tr>);
}
function RCard({title,flag,children,wide}){
  return(
    <div className={`rcard${wide?' wide':''}`}>
      <div className="card-hdr"><h3>{title}</h3>{flag&&<Badge flag={flag}/>}</div>
      {children}
    </div>
  );
}

function ReportView({report,pid,ipdMm,onBack,onNewPatient,fromArchive}){
  const abnCount=(report.findings||[]).filter(f=>f.level==='abnormal').length;
  const borderCount=(report.findings||[]).filter(f=>f.level==='borderline').length;
  const normalCount=(report.findings||[]).filter(f=>f.level==='normal').length;
  return(
    <div className="main">
      {/* Report hero */}
      <div style={{background:'linear-gradient(135deg,#0f172a,#1e3a5f)',borderRadius:16,padding:'24px 28px',marginBottom:22,boxShadow:'0 6px 24px rgba(15,23,42,.3)'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:14}}>
          <div>
            <p style={{fontSize:11,color:'rgba(255,255,255,.45)',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:6}}>Clinical Analysis Report</p>
            <h1 style={{fontSize:24,fontWeight:800,color:'#fff',letterSpacing:'-.02em',fontFamily:'monospace'}}>{pid}</h1>
            <p style={{fontSize:12,color:'rgba(255,255,255,.45)',marginTop:5}}>{report.ts} · {report.scale?`Scale: ${report.scale.toFixed(3)} mm/px`:'Uncalibrated'} · IPD: {ipdMm} mm</p>
            <div style={{display:'flex',gap:10,marginTop:12}}>
              {abnCount>0&&<span style={{background:'rgba(239,68,68,.2)',border:'1px solid rgba(239,68,68,.4)',borderRadius:20,padding:'3px 11px',fontSize:11,color:'#fca5a5',fontWeight:600}}>🔴 {abnCount} Abnormal</span>}
              {borderCount>0&&<span style={{background:'rgba(245,158,11,.15)',border:'1px solid rgba(245,158,11,.35)',borderRadius:20,padding:'3px 11px',fontSize:11,color:'#fcd34d',fontWeight:600}}>⚠️ {borderCount} Borderline</span>}
              {normalCount>0&&<span style={{background:'rgba(34,197,94,.15)',border:'1px solid rgba(34,197,94,.3)',borderRadius:20,padding:'3px 11px',fontSize:11,color:'#86efac',fontWeight:600}}>✅ {normalCount} Normal</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}} className="no-print">
            <button className="btn btn-pdf" onClick={()=>window.print()}>📄 Export PDF</button>
            <button className="btn btn-xlsx" onClick={()=>exportExcel(report,pid,ipdMm)}>📊 Export Excel</button>
            {fromArchive
              ? <button className="btn btn-secondary" onClick={onBack}>← Archive</button>
              : <button className="btn btn-secondary" onClick={onNewPatient}>← New Patient</button>}
          </div>
        </div>
      </div>
      {!report.scale&&(
        <div style={{background:'var(--red-light)',border:'1px solid var(--red-border)',borderRadius:8,padding:'9px 14px',fontSize:12,color:'var(--red)',marginBottom:14}}>
          ⚠ Calibration failed — outer canthus landmarks not found. Measurements in pixels only.
        </div>
      )}
      <div className="kf">
        <h2>Key Findings</h2>
        {report.findings.map((f,i)=>{
          const icon={normal:'✅',borderline:'⚠️',abnormal:'🔴',info:'ℹ️'}[f.level]||'→';
          return(<div key={i} className="kf-item"><span className="kf-icon">{icon}</span><span className={`kf-text ${f.level}`}>{f.text}</span></div>);
        })}
      </div>
      <div className="results-grid">
        <RCard title="Facial Symmetry" flag={report.sym.flag}>
          <table className="meas-table"><tbody>
            <Row label="Chin deviation from midline"  val={report.sym.chinDev}   norm="< 2 mm"/>
            <Row label="Nasal tip deviation"          val={report.sym.noseDev}   norm="< 2 mm"/>
            <Row label="Alar base asymmetry"          val={report.sym.alarAsym}  norm="< 2 mm"/>
            <Row label="Mouth corner asymmetry"       val={report.sym.mouthAsym} norm="< 2 mm"/>
            <Row label="Canthus asymmetry"            val={report.sym.canthAsym} norm="< 2 mm"/>
          </tbody></table>
          <p style={{fontSize:11,color:'var(--gray-400)',marginTop:6}}>Source: Arnett &amp; Bergman (1993)</p>
        </RCard>
        <RCard title="Facial Thirds" flag={report.thirds.flag}>
          {[['Upper third (inferred)',report.thirds.upPct],['Middle third (Gl→Sn)',report.thirds.midPct],["Lower third (Sn→Me')",report.thirds.lowPct]].map(([label,pct])=>pct!=null&&(
            <div key={label} style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--gray-600)',marginBottom:2}}><span>{label}</span><span style={{fontFamily:'monospace',fontWeight:600}}>{pct.toFixed(1)}%</span></div>
              <div className="thirds-bar"><div style={{width:`${Math.min(100,pct)}%`,height:'100%',borderRadius:999,background:Math.abs(pct-33.3)>5?'#f87171':Math.abs(pct-33.3)>3?'#fbbf24':'#4ade80'}}/></div>
            </div>
          ))}
          <p style={{fontSize:11,color:'var(--gray-400)',marginTop:4}}>Ideal 33.3% each · Source: Farkas (1994)</p>
        </RCard>
        <RCard title="Skeletal Class Estimate">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <span style={{fontSize:12,color:'var(--gray-500)'}}>Soft-tissue estimate</span>
            <span className={`badge ${report.skel.cls?.includes('III')?'class-III':report.skel.cls?.includes('II')?'class-II':'class-I'}`} style={{padding:'4px 12px',fontWeight:700}}>{report.skel.cls}</span>
          </div>
          <table className="meas-table"><tbody>
            <Row label="Nasolabial angle (Cm–Sn–Ls)"     val={report.skel.nasolabial} norm="90–110°"          unit="°"/>
            <Row label="Upper lip to E-plane (Ricketts)"  val={report.skel.upperE}     norm="−4 mm (Caucasian)"/>
            <Row label="Lower lip to E-plane (Ricketts)"  val={report.skel.lowerE}     norm="−2 mm (Caucasian)"/>
            <Row label="Pog' to Sn vertical"              val={report.skel.pogSn}      norm="≈ 0 mm (Class I)"/>
          </tbody></table>
          <div className="note-box">⚠ Soft-tissue estimate only. Confirm with lateral cephalogram.</div>
        </RCard>
        <RCard title="Lip Competence & Soft Tissue" flag={report.lip.flag}>
          <table className="meas-table"><tbody>
            <Row label="Upper lip length (Sn→Sto)"   val={report.lip.ulLen}       norm="19–22mm (F) · 20–24mm (M)"/>
            <Row label="Lower lip length (Sto→Me')"  val={report.lip.llLen}       norm="38–44 mm"/>
            <Row label="Interlabial gap (rest)"       val={report.lip.gap}         norm="0–3 mm"/>
            <Row label="Nasolabial angle"             val={report.lip.nasolabial}  norm="90–110°"  unit="°"/>
            <Row label="Mentolabial fold"             val={report.lip.mentolabial} norm="120–135°" unit="°"/>
            <Row label="Upper lip to E-plane"         val={report.lip.upperE}      norm="−4 mm"/>
            <Row label="Lower lip to E-plane"         val={report.lip.lowerE}      norm="−2 mm"/>
          </tbody></table>
          <p style={{fontSize:11,color:'var(--gray-400)',marginTop:6}}>Source: Arnett &amp; Bergman (1993)</p>
        </RCard>
        <RCard title="Smile Arc & Buccal Corridor" flag={report.smile.flag}>
          <div style={{marginBottom:10}}>
            <p style={{fontSize:12,color:'var(--gray-500)',marginBottom:3}}>Smile arc</p>
            <p style={{fontWeight:700,fontSize:16,textTransform:'capitalize',color:{consonant:'var(--green)',flat:'var(--amber)',reverse:'var(--red)',indeterminate:'var(--gray-400)'}[report.smile.arc]||'var(--gray-400)'}}>
              {report.smile.arc}
            </p>
            <p style={{fontSize:11,color:'var(--gray-400)'}}>Consonant = aesthetic ideal · Sarver &amp; Ackerman (2001)</p>
          </div>
          <table className="meas-table"><tbody>
            <Row label="Buccal corridor — left"  val={report.smile.bcLeft}  norm="10–15%" unit="%"/>
            <Row label="Buccal corridor — right" val={report.smile.bcRight} norm="10–15%" unit="%"/>
          </tbody></table>
        </RCard>
        <RCard title="Dental Midline" flag={report.mid.flag}>
          <table className="meas-table"><tbody>
            <Row label="Upper dental midline deviation" val={report.mid.udmDev} norm="< 1 mm"/>
          </tbody></table>
          <p style={{fontSize:11,color:'var(--gray-400)',marginTop:6}}>From facial midline (Gl) · Source: Peck &amp; Peck (1995)</p>
        </RCard>
        <RCard title="Overjet & Overbite Estimate" wide>
          <div className="note-box" style={{marginBottom:12}}>⚠ Photographic estimate — confirm with clinical measurement and radiographs.</div>
          <table className="meas-table"><tbody>
            <tr>
              <td style={{width:'28%'}}>Overjet</td>
              <td>{report.oj.oj!=null?`${report.oj.oj.toFixed(1)} mm`:'—'}</td>
              <td><span className={`badge ${({normal:'bn',increased:'bb',severely_increased:'ba',reverse:'ba',edge_to_edge:'bb',not_measured:'bm'}[report.oj.ojCls]||'bm')}`}>{report.oj.ojCls.replace(/_/g,' ')}</span></td>
              <td style={{fontSize:11,color:'var(--gray-400)',paddingLeft:10}}>Norm: 2–4 mm</td>
            </tr>
            <tr>
              <td>Overbite</td>
              <td>{report.oj.ob!=null?`${report.oj.ob.toFixed(1)} mm`:'—'}</td>
              <td><span className={`badge ${({normal:'bn',increased:'bb',severely_increased:'ba',open_bite:'ba',edge_to_edge:'bb',not_measured:'bm'}[report.oj.obCls]||'bm')}`}>{report.oj.obCls.replace(/_/g,' ')}</span></td>
              <td style={{fontSize:11,color:'var(--gray-400)',paddingLeft:10}}>Norm: 2–4 mm</td>
            </tr>
          </tbody></table>
          <p style={{fontSize:11,color:'var(--gray-400)',marginTop:7}}>Source: Proffit &amp; Fields (2013)</p>
        </RCard>
      </div>
      <div className="disclaimer">
        <strong>Disclaimer:</strong> This analysis is intended to assist clinical assessment and does not replace
        the judgment of a qualified orthodontist. All measurements must be verified clinically before treatment planning.
        Calibration: outer canthi × 0.70 as IPD proxy (Farkas 1994, IPD {ipdMm} mm).
        E-plane norms are Caucasian (Ricketts 1968).
      </div>
    </div>
  );
}

// ── Archive / Library page ─────────────────────────────────────────────────────
function ArchivePage({onViewPatient,onBack}){
  const [patients,setPatients]=useState(loadArchive);
  const [search,setSearch]=useState('');
  const [delConfirm,setDelConfirm]=useState(null);

  function handleDelete(pid,e){
    e.stopPropagation();
    if(delConfirm===pid){
      deleteFromArchive(pid);setPatients(loadArchive());setDelConfirm(null);
    }else{setDelConfirm(pid);}
  }

  const filtered=patients.filter(p=>
    p.pid.toLowerCase().includes(search.toLowerCase())||
    p.report?.ts?.includes(search)||
    p.report?.skel?.cls?.toLowerCase().includes(search.toLowerCase())
  );

  const symFlag=(r)=>r.sym?.flag||'missing_data';
  const overallFlag=(r)=>{
    const flags=[r.sym?.flag,r.thirds?.flag,r.lip?.flag,r.smile?.flag,r.mid?.flag];
    if(flags.some(f=>f==='abnormal'))return'abnormal';
    if(flags.some(f=>f==='borderline'))return'borderline';
    if(flags.every(f=>f==='within_normal_limits'))return'within_normal_limits';
    return'missing_data';
  };
  const flagColor={within_normal_limits:'#16a34a',borderline:'#d97706',abnormal:'#dc2626',missing_data:'#94a3b8'};
  const flagLabel={within_normal_limits:'Normal',borderline:'Borderline',abnormal:'Abnormal',missing_data:'No data'};

  return(
    <div className="main">
      <div style={{background:'linear-gradient(135deg,#0f172a,#1e3a5f)',borderRadius:16,padding:'22px 26px',marginBottom:22,boxShadow:'0 6px 24px rgba(15,23,42,.3)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div>
            <p style={{fontSize:11,color:'rgba(255,255,255,.4)',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:5}}>Patient Archive</p>
            <h1 style={{fontSize:22,fontWeight:800,color:'#fff',letterSpacing:'-.02em'}}>📁 Patient Library</h1>
            <p style={{fontSize:12,color:'rgba(255,255,255,.45)',marginTop:5}}>{patients.length} patient record{patients.length!==1?'s':''} · saved in browser storage</p>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-secondary" style={{fontSize:12,padding:'7px 12px'}} onClick={exportArchiveBackup} title="Download all records as a .json backup file">
              💾 Backup
            </button>
            <label className="btn btn-secondary" style={{fontSize:12,padding:'7px 12px',cursor:'pointer'}} title="Restore records from a backup file">
              📂 Restore
              <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{
                if(e.target.files[0]) importArchiveBackup(e.target.files[0],count=>{setPatients(loadArchive());alert(`✅ Done! Archive now has ${count} patients.`);});
                e.target.value='';
              }}/>
            </label>
            <button className="btn btn-secondary" onClick={onBack}>← New Analysis</button>
          </div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
        <input className="archive-search" placeholder="🔍 Search by ID, date, class…" value={search} onChange={e=>setSearch(e.target.value)}/>
        {search&&<button className="btn-ghost" onClick={()=>setSearch('')}>✕ Clear</button>}
      </div>
      {filtered.length===0?(
        <div className="archive-empty">
          <div className="empty-icon">{patients.length===0?'🗄️':'🔍'}</div>
          <p style={{fontSize:16,fontWeight:600,color:'var(--gray-600)',marginBottom:6}}>{patients.length===0?'No patients yet':'No results'}</p>
          <p style={{fontSize:13}}>{patients.length===0?'Analyses you complete will be saved here automatically.':'Try a different search term.'}</p>
          {patients.length===0&&<button className="btn btn-primary" style={{marginTop:16}} onClick={onBack}>Start First Analysis</button>}
        </div>
      ):(
        <div className="archive-grid">
          {filtered.map(p=>{
            const r=p.report||{};
            const of_=overallFlag(r);
            const sf=symFlag(r);
            const clsCls=r.skel?.cls?.includes('III')?'ba':r.skel?.cls?.includes('II')?'bb':'bn';
            return(
              <div key={p.pid} className="archive-card" onClick={()=>onViewPatient(p)}>
                <button className="archive-del" title={delConfirm===p.pid?'Click again to confirm':'Delete patient'} onClick={e=>handleDelete(p.pid,e)}>
                  {delConfirm===p.pid?'⚠':'🗑'}
                </button>
                {/* Thumbnail strip */}
                {(p.thumbnails?.frontal||p.thumbnails?.profile||p.thumbnails?.smile)&&(
                  <div style={{display:'flex',gap:3,marginBottom:10,borderRadius:8,overflow:'hidden',border:'1px solid var(--gray-100)'}}>
                    {['frontal','profile','smile'].map(k=>
                      p.thumbnails?.[k]?(
                        <img key={k} src={p.thumbnails[k]} alt={k}
                          style={{flex:1,height:56,objectFit:'cover',display:'block'}}/>
                      ):(
                        <div key={k} style={{flex:1,height:56,background:'var(--gray-100)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'var(--gray-300)'}}>📷</div>
                      )
                    )}
                  </div>
                )}
                <div className="archive-pid">{p.pid}</div>
                <div className="archive-ts">🕐 {r.ts||'—'}</div>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                  <span style={{width:10,height:10,borderRadius:'50%',background:flagColor[of_],display:'inline-block',flexShrink:0}}/>
                  <span style={{fontSize:12,fontWeight:600,color:flagColor[of_]}}>{flagLabel[of_]}</span>
                </div>
                <div className="archive-tags">
                  {r.skel?.cls&&<span className={`badge ${clsCls}`}>{r.skel.cls}</span>}
                  <span className={`badge ${{within_normal_limits:'bn',borderline:'bb',abnormal:'ba',missing_data:'bm'}[sf]||'bm'}`}>
                    Sym: {flagLabel[sf]||'—'}
                  </span>
                  {r.smile?.arc&&r.smile.arc!=='indeterminate'&&(
                    <span className={`badge ${r.smile.arc==='consonant'?'bn':r.smile.arc==='reverse'?'ba':'bb'}`}>
                      Arc: {r.smile.arc}
                    </span>
                  )}
                  {r.oj?.oj!=null&&<span className={`badge ${r.oj.ojCls==='normal'?'bn':'bb'}`}>OJ: {r.oj.oj.toFixed(1)} mm</span>}
                </div>
                <div style={{marginTop:10,paddingTop:8,borderTop:'1px solid var(--gray-100)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:11,color:'var(--gray-400)'}}>
                    Scale: {r.scale?`${r.scale.toFixed(3)} mm/px`:'uncal.'}
                  </span>
                  <span style={{fontSize:11,color:'var(--blue)',fontWeight:600}}>View →</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App(){
  const [stage,setStage]   = useState('upload');
  const [files,setFiles]   = useState({frontal:null,profile:null,smile:null});
  const [previews,setPreviews] = useState({frontal:null,profile:null,smile:null});
  const [dims,setDims]     = useState({frontal:{w:1024,h:768},profile:{w:1024,h:768},smile:{w:1024,h:768}});
  const [confirmed,setConfirmed] = useState({});
  const [report,setReport] = useState(null);
  const [error,setError]   = useState(null);
  const [pid,setPid]       = useState('P'+Date.now().toString().slice(-6));
  const [ipdMm,setIpdMm]  = useState(63);
  const [archivePatient,setArchivePatient] = useState(null); // patient record viewed from archive

  function handleFile(pt){return file=>{
    const url=URL.createObjectURL(file);
    setFiles(f=>({...f,[pt]:file}));setPreviews(p=>({...p,[pt]:url}));
    const img=new Image();img.src=url;img.onload=()=>setDims(d=>({...d,[pt]:{w:img.naturalWidth,h:img.naturalHeight}}));
  }}
  function handleRemove(pt){return()=>{
    if(previews[pt])URL.revokeObjectURL(previews[pt]);
    setFiles(f=>({...f,[pt]:null}));setPreviews(p=>({...p,[pt]:null}));
  }}

  const allUploaded=PHOTO_CONFIGS.every(p=>files[p.id]);
  const curIdx=REVIEW_STAGES.indexOf(stage);
  const curPhoto=curIdx>=0?PHOTO_KEYS[curIdx]:null;

  function handleConfirm(lms){
    const key=curPhoto,next={...confirmed,[key]:lms};
    setConfirmed(next);
    if(curIdx<REVIEW_STAGES.length-1){setStage(REVIEW_STAGES[curIdx+1]);}
    else{
      setStage('analysing');
      setTimeout(async()=>{
        try{
          const r=doAnalyse(next,ipdMm);
          // Generate compressed thumbnails for each photo
          const thumbs={};
          for(const k of PHOTO_KEYS){
            if(previews[k]) thumbs[k]=await generateThumbnail(previews[k]);
          }
          const rec={
            pid,ipdMm,
            report:{...r,pid},
            savedAt:new Date().toISOString(),
            thumbnails:thumbs,
            landmarks:next,
          };
          saveToArchive(rec);
          setReport({...r,pid});setStage('results');
        }catch(e){setError('Analysis error: '+e.message);setStage('review-smile');}
      },350);
    }
  }
  function handleBack(){
    if(stage==='review-frontal')setStage('upload');
    else{const i=REVIEW_STAGES.indexOf(stage);if(i>0)setStage(REVIEW_STAGES[i-1]);}
  }
  function handleStepNav(stepKey,stepIdx,activeStep){
    if(stepIdx>=activeStep)return;
    if(stepIdx===0){setStage('upload');return;}
    if(REVIEW_STAGES.includes(stepKey))setStage(stepKey);
    else if(stepKey==='results'&&report)setStage('results');
  }
  function handleReset(){
    setStage('upload');setFiles({frontal:null,profile:null,smile:null});
    setPreviews({frontal:null,profile:null,smile:null});
    setConfirmed({});setReport(null);setError(null);
    setPid('P'+Date.now().toString().slice(-6));
  }

  const activeStep=stage==='analysing'?4:STEPS.findIndex(s=>s.key===stage);
  const showingArchive=stage==='archive';
  const showingArchiveDetail=stage==='archive-detail';

  return(
    <>
      {/* Header */}
      <div className="hdr no-print">
        <div className="hdr-logo-wrap">
          <div className="hdr-logo-icon">⬡</div>
          <span className="hdr-title">OrthoAnalyse</span>
          <span className="hdr-sep"/>
          <span className="hdr-sub">AI-Assisted Soft-Tissue Analysis · Master's Thesis</span>
        </div>
        <div className="hdr-right">
          <div className="hdr-badge"><span className="hdr-dot"/>Decision Support Tool</div>
          <button className="hdr-archive-btn" onClick={()=>setStage('archive')}>
            📁 Patient Archive
          </button>
        </div>
      </div>

      {/* Progress bar (only during active workflow) */}
      {!showingArchive&&!showingArchiveDetail&&stage!=='upload'&&(
        <div className="pbar no-print">
          <ol className="psteps">
            {STEPS.map((s,i)=>{
              const cls=i<activeStep?'done':i===activeStep?'active':'pending';
              const clickable=i<activeStep;
              return(
                <React.Fragment key={s.key}>
                  <li className={`step ${cls}`} onClick={()=>clickable&&handleStepNav(s.key,i,activeStep)} title={clickable?`Go back to ${s.label}`:undefined}>
                    <span className="step-n">{i<activeStep?'✓':i+1}</span>
                    {s.label}
                    {clickable&&<span style={{fontSize:9,color:'var(--green)',marginLeft:2}}>↩</span>}
                  </li>
                  {i<STEPS.length-1&&<span className="step-arr">→</span>}
                </React.Fragment>
              );
            })}
          </ol>
        </div>
      )}

      {error&&(
        <div className="main" style={{paddingBottom:0}}>
          <div className="error-banner">
            <span>⚠ {error}</span>
            <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:16}} onClick={()=>setError(null)}>✕</button>
          </div>
        </div>
      )}

      {/* Archive list */}
      {showingArchive&&(
        <ArchivePage
          onViewPatient={p=>{setArchivePatient(p);setStage('archive-detail');}}
          onBack={()=>setStage('upload')}/>
      )}

      {/* Archive patient detail */}
      {showingArchiveDetail&&archivePatient&&(
        <ReportView
          report={archivePatient.report}
          pid={archivePatient.pid}
          ipdMm={archivePatient.ipdMm||63}
          fromArchive={true}
          onBack={()=>setStage('archive')}
          onNewPatient={handleReset}/>
      )}

      {/* Upload */}
      {stage==='upload'&&(
        <div className="main">
          {/* Hero banner */}
          <div style={{background:'linear-gradient(135deg,#0f172a 0%,#1e3a5f 60%,#1e40af 100%)',borderRadius:18,padding:'32px 36px',marginBottom:24,position:'relative',overflow:'hidden',boxShadow:'0 8px 32px rgba(15,23,42,.35)'}}>
            <div style={{position:'absolute',top:-40,right:-40,width:220,height:220,borderRadius:'50%',background:'rgba(255,255,255,.04)',pointerEvents:'none'}}/>
            <div style={{position:'absolute',bottom:-60,right:100,width:160,height:160,borderRadius:'50%',background:'rgba(99,102,241,.12)',pointerEvents:'none'}}/>
            <div style={{position:'relative',zIndex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                <span style={{background:'rgba(59,130,246,.25)',border:'1px solid rgba(59,130,246,.4)',borderRadius:20,padding:'3px 12px',fontSize:11,color:'#93c5fd',fontWeight:600,letterSpacing:'.04em'}}>THESIS RESEARCH TOOL</span>
                <span style={{background:'rgba(34,197,94,.15)',border:'1px solid rgba(34,197,94,.3)',borderRadius:20,padding:'3px 12px',fontSize:11,color:'#86efac',fontWeight:600,letterSpacing:'.04em'}}>✓ Decision Support Only</span>
              </div>
              <h1 style={{fontSize:26,fontWeight:800,color:'#fff',marginBottom:8,letterSpacing:'-.02em',lineHeight:1.2}}>
                AI-Assisted Orthodontic<br/>Photo Analysis
              </h1>
              <p style={{fontSize:13,color:'rgba(255,255,255,.60)',maxWidth:520,lineHeight:1.6}}>
                Upload three standardised extraoral photographs. The AI auto-places anatomical landmarks for clinician review before computing 7 soft-tissue analyses.
              </p>
              <div style={{display:'flex',gap:20,marginTop:18}}>
                {[['🎯','7 Clinical Analyses'],['📐','mm-Calibrated'],['🔒','On-Device Only'],['📁','Auto-Archived']].map(([icon,label])=>(
                  <div key={label} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'rgba(255,255,255,.55)',fontWeight:500}}>
                    <span style={{fontSize:14}}>{icon}</span>{label}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Patient info row */}
          <div style={{display:'flex',gap:14,flexWrap:'wrap',marginBottom:18}}>
            <div className="card" style={{display:'flex',alignItems:'center',gap:12,padding:'12px 18px',flex:'1 1 220px'}}>
              <div style={{width:36,height:36,background:'var(--blue-light)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>🪪</div>
              <div style={{flex:1}}>
                <label style={{fontSize:11,fontWeight:700,color:'var(--gray-400)',letterSpacing:'.05em',textTransform:'uppercase',display:'block',marginBottom:4}}>Patient ID</label>
                <input className="pid-input" value={pid} onChange={e=>setPid(e.target.value)} placeholder="e.g. P001" style={{width:'100%',border:'1.5px solid var(--gray-200)',borderRadius:8,padding:'6px 10px',fontSize:14,fontWeight:600,outline:'none',fontFamily:'monospace'}}/>
              </div>
            </div>
            <div className="card" style={{display:'flex',alignItems:'center',gap:12,padding:'12px 18px',flex:'1 1 280px'}}>
              <div style={{width:36,height:36,background:'#fef9c3',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>📏</div>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:'var(--gray-400)',letterSpacing:'.05em',textTransform:'uppercase',display:'block',marginBottom:4}}>IPD (mm)</label>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <input type="number" min="52" max="74" value={ipdMm} onChange={e=>setIpdMm(Number(e.target.value)||63)}
                    style={{border:'1.5px solid var(--gray-200)',borderRadius:8,padding:'6px 10px',fontSize:14,fontWeight:600,width:68,textAlign:'center',outline:'none'}}/>
                  <span style={{fontSize:11,color:'var(--gray-400)',lineHeight:1.4}}>Inter-pupillary distance<br/>used for mm calibration</span>
                </div>
              </div>
            </div>
          </div>

          {/* Upload slots */}

            ))}
          </div>

          {/* Clinical notice */}
          <div style={{display:'flex',alignItems:'flex-start',gap:12,background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,padding:'12px 16px',fontSize:12,color:'#92400e',marginBottom:20,lineHeight:1.6}}>
            <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
            <span><strong>Clinical Notice:</strong> AI-suggested landmarks must be reviewed and confirmed by a qualified orthodontist before analysis runs. This system is a decision-support tool, not a diagnostic tool.</span>
          </div>

          <div style={{display:'flex',justifyContent:'flex-end',gap:10,alignItems:'center'}}>
            {!allUploaded&&<p style={{fontSize:12,color:'var(--gray-400)',fontWeight:500}}>Upload all 3 photos to continue</p>}
            <button className="btn btn-secondary" onClick={()=>setStage('archive')}>📁 View Archive</button>
            <button className="btn btn-primary btn-lg" disabled={!allUploaded} onClick={()=>setStage('review-frontal')}>
              🔍 Detect Landmarks →
            </button>
          </div>
        </div>
      )}

      {/* Landmark review */}
      {REVIEW_STAGES.includes(stage)&&previews[curPhoto]&&(
        <LandmarkEditor key={stage} photoType={curPhoto} imageUrl={previews[curPhoto]}
          imgW={dims[curPhoto].w} imgH={dims[curPhoto].h}
          initialLms={confirmed[curPhoto]||null}
          onConfirm={handleConfirm} onBack={handleBack}/>
      )}

      {/* Analysing */}
      {stage==='analysing'&&(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:320,gap:14}}>
          <div className="spinner-lg"/>
          <p style={{fontWeight:600,color:'var(--gray-600)'}}>Running clinical analysis…</p>
          <p style={{fontSize:13,color:'var(--gray-400)'}}>Computing 7 analyses · Saving to archive</p>
        </div>
      )}

      {/* Results */}
      {stage==='results'&&report&&(
        <ReportView report={report} pid={pid} ipdMm={ipdMm}
          fromArchive={false}
          onBack={()=>setStage('archive')}
          onNewPatient={handleReset}/>
      )}

      {/* Branding */}
      <div className="branding">
        <div className="branding-inner">
          <span className="branding-line1">Made with <span className="heart">♥</span> Dr. Mohammad Samih</span>
          <span className="branding-line2">Programmed with <span className="heart">♥</span> by Ibrahim AlBugha</span>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
